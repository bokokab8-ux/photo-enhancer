
name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: AIPhotoEnhancer/AIPhotoEnhancer
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-photo-app
          path: AIPhotoEnhancer/AIPhotoEnhancer/app/build/outputs/apk/debug/*.apk
